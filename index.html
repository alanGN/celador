<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simulacro Celador - Unidades 1 y 2</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#121b2d;
      --muted:#9fb0d0;
      --text:#eaf0ff;
      --accent:#6ea8fe;
      --good:#39d98a;
      --bad:#ff5c7a;
      --warn:#ffd166;
      --border:rgba(255,255,255,.12);
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:18px;
    }

    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 20% -10%, rgba(110,168,254,.25), transparent 55%),
                  radial-gradient(1000px 700px at 90% 0%, rgba(57,217,138,.18), transparent 50%),
                  var(--bg);
      color:var(--text);
      line-height:1.35;
    }

    .wrap{max-width:980px; margin:0 auto; padding:20px 14px 80px;}

    header{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin:8px 0 18px;
    }

    .title{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    h1{margin:0; font-size:22px; letter-spacing:.2px;}
    .subtitle{color:var(--muted); font-size:13px; margin-top:4px;}

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding:14px;
    }

    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .row > *{flex:1 1 200px;}

    label{display:block; font-size:12px; color:var(--muted); margin:0 0 6px;}

    select, button{
      width:100%;
      background: rgba(255,255,255,.06);
      border:1px solid var(--border);
      color: var(--text);
      padding:12px 12px;
      border-radius: 14px;
      font-size:14px;
      outline:none;
    }

    button{
      cursor:pointer;
      background: linear-gradient(180deg, rgba(110,168,254,.95), rgba(110,168,254,.65));
      border:none;
      font-weight:700;
      letter-spacing:.2px;
      transition: transform .06s ease, filter .15s ease;
    }
    button:active{transform: translateY(1px) scale(.99);}
    button.secondary{
      background: rgba(255,255,255,.08);
      border:1px solid var(--border);
      font-weight:600;
    }

    .pill{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:8px 10px;
      border-radius: 999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.05);
      color: var(--muted);
      font-size:12px;
      white-space:nowrap;
    }
    .pill b{color:var(--text); font-weight:800;}

    .quiz{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:12px;
    }

    .q{
      padding:14px;
      border-radius: var(--radius);
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
    }

    .qhead{display:flex; gap:10px; align-items:flex-start; justify-content:space-between;}

    .qnum{
      min-width:44px;
      text-align:center;
      padding:8px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border:1px solid var(--border);
      color: var(--muted);
      font-weight:800;
      font-size:12px;
    }

    .qtext{font-size:15px; margin:0; padding-top:2px;}

    .options{margin-top:10px; display:flex; flex-direction:column; gap:8px;}

    .opt{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:10px 10px;
      border-radius: 14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
    }

    .opt input{margin-top:3px;}
    .opt span{color: var(--text); font-size:14px;}

    .footer-actions{
      position: sticky;
      bottom: 12px;
      z-index: 10;
      margin-top: 16px;
    }

    .footer-actions .card{padding:12px;}

    .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    @media (max-width:700px){
      .grid2{grid-template-columns:1fr;}
      .title{flex-direction:column;}
    }

    .results{
      margin-top:14px;
      display:none;
    }

    .results .summary{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }

    .kpi{
      flex:1 1 220px;
      border:1px solid var(--border);
      border-radius: var(--radius);
      padding:12px;
      background: rgba(255,255,255,.04);
    }

    .kpi .label{color:var(--muted); font-size:12px;}
    .kpi .value{font-size:22px; font-weight:900; margin-top:4px;}

    .tag{display:inline-block; padding:6px 10px; border-radius:999px; font-weight:800; font-size:12px;}
    .tag.good{background: rgba(57,217,138,.14); color: var(--good); border:1px solid rgba(57,217,138,.35);}
    .tag.bad{background: rgba(255,92,122,.12); color: var(--bad); border:1px solid rgba(255,92,122,.35);}
    .tag.blank{background: rgba(255,209,102,.12); color: var(--warn); border:1px solid rgba(255,209,102,.35);}

    .review{margin-top:12px; display:flex; flex-direction:column; gap:10px;}
    .review .q{background: rgba(255,255,255,.03);}

    .answerline{margin-top:10px; color:var(--muted); font-size:13px;}
    .answerline b{color:var(--text);}
    .why{margin-top:8px; font-size:13px; color:var(--muted);}

    .notice{color:var(--muted); font-size:12px; margin-top:10px;}
    .hide{display:none !important;}

    .disabled{
      opacity:.6;
      filter: grayscale(.1);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">
        <div>
          <h1>Simulacro (Celador) • Unidades 1 y 2</h1>
          <div class="subtitle">Sin backend. Exámenes aleatorios. Pensado para móvil.</div>
        </div>
        <div class="pill" id="scorePill">Puntuación: <b id="pillPoints">-</b></div>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <label for="unit">1) Unidad</label>
            <select id="unit">
              <option value="u1">Unidad 1</option>
              <option value="u2">Unidad 2</option>
            </select>
          </div>

          <div>
            <label for="examType">2) Tipo de examen</label>
            <select id="examType"></select>
          </div>

          <div id="sizeWrap">
            <label for="size">3) Nº preguntas</label>
            <select id="size">
              <option value="10">10 preguntas</option>
              <option value="20">20 preguntas</option>
              <option value="30">30 preguntas</option>
            </select>
          </div>

          <div>
            <label>&nbsp;</label>
            <button id="startBtn">Generar examen</button>
          </div>
        </div>
        <div class="notice" id="rulesText"></div>
      </div>
    </header>

    <main>
      <section id="quizSection" class="card hide">
        <div class="quiz" id="quiz"></div>
        <div class="notice">Tip: puedes tocar la misma opción para desmarcarla, o usar “Dejar en blanco”.</div>
      </section>

      <div class="footer-actions hide" id="actions">
        <div class="card grid2">
          <button id="evaluateBtn">EVALUAR</button>
          <button id="restartBtn" class="secondary">Reiniciar</button>
        </div>
      </div>

      <section id="results" class="results card">
        <div class="summary">
          <div class="kpi">
            <div class="label" id="scoreLabel">Puntuación total</div>
            <div class="value" id="totalScore">0</div>
          </div>
          <div class="kpi">
            <div class="label">Resumen</div>
            <div class="value" id="summaryText">-</div>
          </div>
          <div class="kpi">
            <div class="label">Reglas</div>
            <div class="value" id="rulesKpi" style="font-size:14px; font-weight:800;">-</div>
          </div>
        </div>

        <div class="review" id="review"></div>

        <div class="card" style="margin-top:14px;">
          <div class="grid2">
            <button id="newExamBtn">Nuevo examen (mismo tipo)</button>
            <button id="backTopBtn" class="secondary">Volver arriba</button>
          </div>
          <div class="grid2" style="margin-top:10px;">
            <button id="restartFromResultsBtn" class="secondary">Reiniciar (borrar todo)</button>
            <button id="changeConfigBtn" class="secondary">Cambiar unidad / tipo</button>
          </div>
          <div class="notice">Tip: “Nuevo examen” genera otra combinación aleatoria.</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // ==========================================================
    //  CONFIG: unidades y tipos
    // ==========================================================
    const EXAM_TYPES = {
      // Unidad 1 (mantenemos)
      u1_ud1:   { unit:"u1", label:"U1 • Preguntas (Anatomía básica)", mode:"mcq", sizeMode:"variable", scoringMode:"points" },
      u1_sem1:  { unit:"u1", label:"U1 • Seminario (TME / prevención)", mode:"mcq", sizeMode:"variable", scoringMode:"points" },
      u1_test17:{ unit:"u1", label:"U1 • Cuestionario (17 preguntas)", mode:"mcq", sizeMode:"fixed", fixedCount:17, scoringMode:"count" },
      u1_vf:    { unit:"u1", label:"U1 • Verdadero / Falso", mode:"vf",  sizeMode:"fixed", fixedCount:null, scoringMode:"count" },

      // Unidad 2 (10/20/30)
      u2_ud2:    { unit:"u2", label:"U2 • Movilización y traslado (Nivel 1)", mode:"mcq", sizeMode:"variable", scoringMode:"points" },
      // Mantenemos el cuestionario fijo (el de clase)
      u2_test11: { unit:"u2", label:"U2 • Cuestionario (11 preguntas)", mode:"mcq", sizeMode:"fixed", fixedCount:11, scoringMode:"count" },
      // NUEVO: Verdadero/Falso U2 (incluye el VF que me pasaste + más)
      u2_vf:     { unit:"u2", label:"U2 • Verdadero / Falso", mode:"vf", sizeMode:"fixed", fixedCount:null, scoringMode:"count" },
    };

    // ==========================================================
    //  BANCO DE PREGUNTAS
    // ==========================================================
    const QUESTION_BANK = [
      // =========================
      // U1 (dejo lo que tenías tal cual)
      // =========================
      { id:"ud1-001", typeKey:"u1_ud1", q:"¿Cuál es la unidad mínima de la vida?", options:[
        {k:"a",t:"El tejido"},{k:"b",t:"La célula"},{k:"c",t:"El órgano"}
      ], correct:"b", why:"La célula es la unidad mínima de la vida; tejidos y órganos son niveles superiores." },

      { id:"ud1-002", typeKey:"u1_ud1", q:"¿Qué estudia la Citología?", options:[
        {k:"a",t:"Las células"},{k:"b",t:"Los huesos"},{k:"c",t:"Los órganos"}
      ], correct:"a", why:"La citología estudia las células." },

      { id:"ud1-003", typeKey:"u1_ud1", q:"Las células humanas son principalmente:", options:[
        {k:"a",t:"Procariotas"},{k:"b",t:"Eucariotas"},{k:"c",t:"Bacterianas"}
      ], correct:"b", why:"Las células humanas son eucariotas (con núcleo y orgánulos)." },

      { id:"ud1-004", typeKey:"u1_ud1", q:"¿Qué rama estudia los tejidos biológicos?", options:[
        {k:"a",t:"Histología"},{k:"b",t:"Citología"},{k:"c",t:"Fisiología"}
      ], correct:"a", why:"La histología se ocupa del estudio de los tejidos." },

      { id:"ud1-005", typeKey:"u1_ud1", q:"El sistema musculoesquelético está constituido por:", options:[
        {k:"a",t:"Sistema esquelético y músculos"},{k:"b",t:"Sistema endocrino y nervioso"},{k:"c",t:"Sistema digestivo y excretor"}
      ], correct:"a", why:"Incluye huesos/articulaciones y músculos/tendones." },

      { id:"ud1-008", typeKey:"u1_ud1", q:"¿Dónde se produce la hematopoyesis?", options:[
        {k:"a",t:"Médula ósea roja"},{k:"b",t:"Médula ósea amarilla"},{k:"c",t:"Cartílago articular"}
      ], correct:"a", why:"En la médula ósea roja se producen glóbulos rojos, blancos y plaquetas." },

      { id:"ud1-011", typeKey:"u1_ud1", q:"Las células que construyen hueso y sintetizan matriz ósea son:", options:[
        {k:"a",t:"Osteoclastos"},{k:"b",t:"Osteoblastos"},{k:"c",t:"Osteocitos"}
      ], correct:"b", why:"Los osteoblastos forman hueso; los osteoclastos lo reabsorben; los osteocitos son maduros." },

      { id:"ud1-017", typeKey:"u1_ud1", q:"Las vértebras cervicales son:", options:[
        {k:"a",t:"12"},{k:"b",t:"7"},{k:"c",t:"5"}
      ], correct:"b", why:"Hay 7 vértebras cervicales." },

      { id:"ud1-020", typeKey:"u1_ud1", q:"Las costillas verdaderas son:", options:[
        {k:"a",t:"7 pares"},{k:"b",t:"5 pares"},{k:"c",t:"12 pares"}
      ], correct:"a", why:"Las 7 primeras se unen al esternón (verdaderas)." },

      { id:"ud1-031", typeKey:"u1_ud1", q:"El intercambio gaseoso principal ocurre en:", options:[
        {k:"a",t:"Bronquios"},{k:"b",t:"Alvéolos"},{k:"c",t:"Faringe"}
      ], correct:"b", why:"En los alvéolos se realiza el intercambio O2/CO2." },

      { id:"ud1-040", typeKey:"u1_ud1", q:"Capas del corazón (de interior a exterior):", options:[
        {k:"a",t:"Pericardio, miocardio, endocardio"},{k:"b",t:"Endocardio, miocardio, pericardio"},{k:"c",t:"Pleura, peritoneo, periostio"}
      ], correct:"b", why:"Endocardio (interior), miocardio, pericardio (exterior)." },

      // Seminario 1
      { id:"sem-011", typeKey:"u1_sem1", q:"La mecánica corporal es:", options:[
        {k:"a",t:"Uso eficaz, coordinado y seguro del cuerpo para moverse y mantener equilibrio"},{k:"b",t:"Solo levantar pesas"},{k:"c",t:"Solo estiramientos"}
      ], correct:"a", why:"Incluye alineación, equilibrio y movimiento coordinado." },

      { id:"sem-013", typeKey:"u1_sem1", q:"Base de apoyo amplia y centro de gravedad bajo:", options:[
        {k:"a",t:"Aumentan la estabilidad"},{k:"b",t:"Disminuyen estabilidad"},{k:"c",t:"No afectan"}
      ], correct:"a", why:"Principio básico: más base y CG bajo = más estabilidad." },

      { id:"sem-014", typeKey:"u1_sem1", q:"Mover una carga cerca del centro de gravedad:", options:[
        {k:"a",t:"Requiere menos esfuerzo"},{k:"b",t:"Requiere más esfuerzo"},{k:"c",t:"Es igual"}
      ], correct:"a", why:"Cuanto más cerca, menor brazo de palanca y menor esfuerzo." },

      { id:"sem-021", typeKey:"u1_sem1", q:"Peso máximo recomendado para manipulación de cargas en sedestación:", options:[
        {k:"a",t:"5 kg"},{k:"b",t:"25 kg"},{k:"c",t:"50 kg"}
      ], correct:"a", why:"Se recomienda no superar 5 kg en sedestación." },

      { id:"sem-023", typeKey:"u1_sem1", q:"Al levantar una carga del suelo, se aconseja:", options:[
        {k:"a",t:"Flexionar rodillas y mantener espalda recta"},{k:"b",t:"Flexionar la columna lumbar"},{k:"c",t:"Girar el tronco con peso en alto"}
      ], correct:"a", why:"Usar rodillas/caderas y minimizar participación de columna." },

      // Cuestionario 17 U1
      { id:"q17-01", typeKey:"u1_test17", q:"¿Qué estructura separa cavidad torácica y abdominal?", options:[
        {k:"a",t:"Diafragma"},{k:"b",t:"Pleura"},{k:"c",t:"Periostio"}
      ], correct:"a", why:"El diafragma separa tórax y abdomen y participa en la respiración." },
      { id:"q17-02", typeKey:"u1_test17", q:"¿Cuántos lóbulos tiene el pulmón izquierdo?", options:[
        {k:"a",t:"1"},{k:"b",t:"2"},{k:"c",t:"3"}
      ], correct:"b", why:"El pulmón izquierdo tiene 2 lóbulos; el derecho 3." },
      { id:"q17-03", typeKey:"u1_test17", q:"La unidad funcional del riñón es:", options:[
        {k:"a",t:"Alvéolo"},{k:"b",t:"Neurona"},{k:"c",t:"Nefrona"}
      ], correct:"c", why:"La nefrona filtra la sangre y forma la orina." },
      { id:"q17-04", typeKey:"u1_test17", q:"La sangre llega al corazón desde el cuerpo por:", options:[
        {k:"a",t:"Venas cavas"},{k:"b",t:"Aorta"},{k:"c",t:"Arteria pulmonar"}
      ], correct:"a", why:"Las venas cavas desembocan en la aurícula derecha." },
      { id:"q17-05", typeKey:"u1_test17", q:"El sistema nervioso central está formado por:", options:[
        {k:"a",t:"Encéfalo y médula espinal"},{k:"b",t:"Nervios y ganglios"},{k:"c",t:"Solo médula"}
      ], correct:"a", why:"SNC = encéfalo + médula espinal." },
      { id:"q17-06", typeKey:"u1_test17", q:"¿Qué estructura evita el paso de alimentos a la tráquea?", options:[
        {k:"a",t:"Epiglotis"},{k:"b",t:"Laringe"},{k:"c",t:"Bronquio"}
      ], correct:"a", why:"La epiglotis cierra la entrada laríngea durante la deglución." },
      { id:"q17-07", typeKey:"u1_test17", q:"Las plaquetas participan principalmente en:", options:[
        {k:"a",t:"Defensa"},{k:"b",t:"Coagulación"},{k:"c",t:"Intercambio gaseoso"}
      ], correct:"b", why:"Ayudan a taponar heridas y formar coágulos." },
      { id:"q17-08", typeKey:"u1_test17", q:"La tráquea se mantiene abierta por:", options:[
        {k:"a",t:"Anillos cartilaginosos"},{k:"b",t:"Vellosidades"},{k:"c",t:"Músculo liso circular"}
      ], correct:"a", why:"Los anillos de cartílago evitan el colapso." },
      { id:"q17-09", typeKey:"u1_test17", q:"El esqueleto axial incluye:", options:[
        {k:"a",t:"Cabeza, cuello y tronco"},{k:"b",t:"Solo extremidades"},{k:"c",t:"Solo pelvis"}
      ], correct:"a", why:"Axial = cabeza, cuello y tronco." },
      { id:"q17-10", typeKey:"u1_test17", q:"Un hueso sesamoideo típico es:", options:[
        {k:"a",t:"Rótula"},{k:"b",t:"Húmero"},{k:"c",t:"Esternón"}
      ], correct:"a", why:"La rótula es el ejemplo clásico." },
      { id:"q17-11", typeKey:"u1_test17", q:"Los alvéolos son importantes porque:", options:[
        {k:"a",t:"Producen bilis"},{k:"b",t:"Realizan intercambio O2/CO2"},{k:"c",t:"Forman plaquetas"}
      ], correct:"b", why:"Allí ocurre el intercambio gaseoso." },
      { id:"q17-12", typeKey:"u1_test17", q:"¿Cuál es el intestino delgado?", options:[
        {k:"a",t:"Duodeno, yeyuno e íleon"},{k:"b",t:"Ciego, colon y recto"},{k:"c",t:"Faringe, laringe y tráquea"}
      ], correct:"a", why:"Son las 3 porciones del intestino delgado." },
      { id:"q17-13", typeKey:"u1_test17", q:"Los osteoclastos se encargan de:", options:[
        {k:"a",t:"Formar hueso"},{k:"b",t:"Reabsorber/destruir hueso"},{k:"c",t:"Nutrir el cartílago"}
      ], correct:"b", why:"Osteoclastos = reabsorción ósea." },
      { id:"q17-14", typeKey:"u1_test17", q:"La diástole es:", options:[
        {k:"a",t:"Contracción"},{k:"b",t:"Relajación/llenado"},{k:"c",t:"Paro cardiaco"}
      ], correct:"b", why:"Diástole = relajación y llenado." },
      { id:"q17-15", typeKey:"u1_test17", q:"Los nervios craneales son:", options:[
        {k:"a",t:"12 pares"},{k:"b",t:"31 pares"},{k:"c",t:"7 pares"}
      ], correct:"a", why:"Del encéfalo salen 12 pares." },
      { id:"q17-16", typeKey:"u1_test17", q:"El músculo cardíaco es:", options:[
        {k:"a",t:"Liso y voluntario"},{k:"b",t:"Estriado e involuntario"},{k:"c",t:"Liso e involuntario"}
      ], correct:"b", why:"Es estriado e involuntario." },
      { id:"q17-17", typeKey:"u1_test17", q:"El colon sigmoideo está:", options:[
        {k:"a",t:"Antes del recto"},{k:"b",t:"Antes del duodeno"},{k:"c",t:"Dentro del estómago"}
      ], correct:"a", why:"Va tras el descendente y antes del recto." },

      // VF U1
      { id:"vf-01", typeKey:"u1_vf", q:"La higiene de manos es la medida más eficaz para prevenir infecciones cruzadas.", options:[
        {k:"a",t:"Verdadero"},{k:"b",t:"Falso"}
      ], correct:"a", why:"La higiene de manos reduce la transmisión de microorganismos." },
      { id:"vf-02", typeKey:"u1_vf", q:"En sedestación siempre disminuye la carga sobre los discos lumbares.", options:[
        {k:"a",t:"Verdadero"},{k:"b",t:"Falso"}
      ], correct:"b", why:"A menudo aumenta por rectificación lumbar/posición." },
      { id:"vf-03", typeKey:"u1_vf", q:"Los músculos grandes se fatigan con menor rapidez que los pequeños.", options:[
        {k:"a",t:"Verdadero"},{k:"b",t:"Falso"}
      ], correct:"a", why:"Principio de mecánica corporal." },
      { id:"vf-04", typeKey:"u1_vf", q:"Es recomendable girar el tronco con carga en alto para ahorrar pasos.", options:[
        {k:"a",t:"Verdadero"},{k:"b",t:"Falso"}
      ], correct:"b", why:"Aumenta riesgo: se gira con pies y base estable." },
      { id:"vf-05", typeKey:"u1_vf", q:"La lordosis cervical presenta concavidad posterior.", options:[
        {k:"a",t:"Verdadero"},{k:"b",t:"Falso"}
      ], correct:"a", why:"Lordosis cervical y lumbar = concavidad posterior." },

      // =========================
      // U2 • MCQ (rehacido/expandido a más nivel)
      // =========================

      // Higiene, guantes, infección cruzada (más fino)
      { id:"u2h-001", typeKey:"u2_ud2",
        q:"En un traslado convencional, ¿cuál de estas situaciones justificaría usar guantes NO estériles según precauciones estándar?",
        options:[
          {k:"a",t:"Servir la comida al paciente"},
          {k:"b",t:"Contacto con sangre/fluidos o limpieza de material potencialmente contaminado"},
          {k:"c",t:"Trasladar una muestra cerrada al laboratorio (sin contacto con fluidos)"},
          {k:"d",t:"Mover una cama por el pasillo"}
        ],
        correct:"b",
        why:"Los guantes no estériles se usan cuando hay riesgo de contacto con sangre/fluidos o material contaminado. No se recomiendan como rutina para tareas sin riesgo."
      },
      { id:"u2h-002", typeKey:"u2_ud2",
        q:"Si tras retirar los guantes vas a tocar una barandilla y luego al paciente, la medida correcta es:",

        options:[{k:"a",t:"Verdadero"},{k:"b",t:"Falso"}],
        correct:"a",
        why:"Redón: drenaje quirúrgico cerrado por aspiración (frecuente en traumatología)."
      },
      { id:"u2vf-09", typeKey:"u2_vf",
        q:"Lo primero que debemos hacer al llegar a la sala con el paciente es preparar la habitación para entrar con el paciente y pasarlo a la cama.",
        options:[{k:"a",t:"Verdadero"},{k:"b",t:"Falso"}],
        correct:"b",
        why:"La secuencia del traslado prioriza avisar/coordinar con enfermería al llegar; luego se prepara y se acomoda."
      },
      { id:"u2vf-10", typeKey:"u2_vf",
        q:"La identificación activa del paciente se realiza informando a la enfermera por el nombre del paciente, preguntando al paciente su nombre, fecha de nacimiento y comprobando lo que nos dice en su pulsera identificativa.",
        options:[{k:"a",t:"Verdadero"},{k:"b",t:"Falso"}],
        correct:"a",
        why:"IAP: el paciente verbaliza datos y se comprueban con pulsera identificativa."
      },

      // Más VF U2 (para tener un banco potente)
      { id:"u2vf-11", typeKey:"u2_vf",
        q:"El uso de guantes sustituye la necesidad de realizar higiene de manos.",
        options:[{k:"a",t:"Verdadero"},{k:"b",t:"Falso"}],
        correct:"b",
        why:"Guantes no sustituyen higiene de manos; se hace antes y después."
      },
      { id:"u2vf-12", typeKey:"u2_vf",
        q:"Durante el traslado nunca hay que dejar solo al paciente.",
        options:[{k:"a",t:"Verdadero"},{k:"b",t:"Falso"}],
        correct:"a",
        why:"Durante el traslado la responsabilidad del paciente es del celador y requiere vigilancia."
      },
      { id:"u2vf-13", typeKey:"u2_vf",
        q:"En un traslado, las barandillas deben ir levantadas durante el recorrido.",
        options:[{k:"a",t:"Verdadero"},{k:"b",t:"Falso"}],
        correct:"a",
        why:"Seguridad: barandillas levantadas para evitar caídas."
      },
      { id:"u2vf-14", typeKey:"u2_vf",
        q:"En aislamiento protector es correcto retirar la mascarilla del paciente durante el trayecto para que “respire mejor”.",
        options:[{k:"a",t:"Verdadero"},{k:"b",t:"Falso"}],
        correct:"b",
        why:"La mascarilla protege al inmunodeprimido de gérmenes del entorno."
      },
      { id:"u2vf-15", typeKey:"u2_vf",
        q:"En la movilización es recomendable dar órdenes breves y concretas al paciente.",
        options:[{k:"a",t:"Verdadero"},{k:"b",t:"Falso"}],
        correct:"a",
        why:"Favorece colaboración y reduce errores."
      },
    ];

    // ==========================================================
    //  PUNTUACIÓN (modo points)
    // ==========================================================
    const SCORING = {
      10: { ok: 1, bad: -0.33, blank: 0 },
      20: { ok: 0.5, bad: -0.16, blank: 0 },
      30: { ok: 0.33, bad: -0.11, blank: 0 },
    };

    // ==========================================================
    //  DOM
    // ==========================================================
    const elUnit = document.getElementById('unit');
    const elExamType = document.getElementById('examType');
    const elSize = document.getElementById('size');
    const sizeWrap = document.getElementById('sizeWrap');

    const startBtn = document.getElementById('startBtn');
    const quizSection = document.getElementById('quizSection');
    const quizEl = document.getElementById('quiz');
    const actions = document.getElementById('actions');
    const evaluateBtn = document.getElementById('evaluateBtn');
    const restartBtn = document.getElementById('restartBtn');

    const results = document.getElementById('results');
    const review = document.getElementById('review');
    const rulesText = document.getElementById('rulesText');
    const rulesKpi = document.getElementById('rulesKpi');
    const scorePill = document.getElementById('pillPoints');
    const totalScoreEl = document.getElementById('totalScore');
    const summaryTextEl = document.getElementById('summaryText');
    const scoreLabel = document.getElementById('scoreLabel');

    const newExamBtn = document.getElementById('newExamBtn');
    const backTopBtn = document.getElementById('backTopBtn');
    const restartFromResultsBtn = document.getElementById('restartFromResultsBtn');
    const changeConfigBtn = document.getElementById('changeConfigBtn');

    // ==========================================================
    //  ESTADO
    // ==========================================================
    let currentExam = [];
    let locked = false;

    function fmt(n){
      const s = (Math.round(n * 100) / 100).toFixed(2);
      return s.replace(/\.00$/, '').replace(/(\.[0-9])0$/, '$1');
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function shuffle(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getActiveTypeKey(){
      return elExamType.value;
    }

    function getTypeCfg(typeKey){
      return EXAM_TYPES[typeKey];
    }

    function getCountForSelection(){
      const cfg = getTypeCfg(getActiveTypeKey());
      if(cfg.sizeMode === "fixed"){
        const pool = QUESTION_BANK.filter(q => q.typeKey === getActiveTypeKey());
        const fixed = cfg.fixedCount ?? pool.length;
        return fixed;
      }
      return Number(elSize.value);
    }

    function setRulesUI(){
      const cfg = getTypeCfg(getActiveTypeKey());

      if(cfg.scoringMode === "count"){
        scoreLabel.textContent = "Aciertos";
        const n = getCountForSelection();
        const txt = `Reglas: ${n} preguntas · Resultado = aciertos / ${n}.`;
        rulesText.textContent = txt;
        rulesKpi.textContent = txt;
        scorePill.textContent = txt;
        return;
      }

      scoreLabel.textContent = "Puntuación total";
      const n = Number(elSize.value);
      const s = SCORING[n];
      const txt = `Reglas: Bien +${fmt(s.ok)} · Mal ${fmt(s.bad)} · Blanco +${fmt(s.blank)}.`;
      rulesText.textContent = txt;
      rulesKpi.textContent = txt;
      scorePill.textContent = txt;
    }

    function rebuildExamTypeOptions(){
      const unit = elUnit.value;
      const options = Object.entries(EXAM_TYPES)
        .filter(([,cfg]) => cfg.unit === unit)
        .map(([k,cfg]) => ({k, label: cfg.label}));

      elExamType.innerHTML = options.map(o => `<option value="${o.k}">${escapeHtml(o.label)}</option>`).join("");

      // Defaults
      if(unit === "u1") elExamType.value = "u1_ud1";
      if(unit === "u2") elExamType.value = "u2_ud2";

      applyTypeUI();
      setRulesUI();
    }

    function applyTypeUI(){
      const cfg = getTypeCfg(getActiveTypeKey());
      if(cfg.sizeMode === "fixed"){
        sizeWrap.classList.add("disabled");
        elSize.disabled = true;
      } else {
        sizeWrap.classList.remove("disabled");
        elSize.disabled = false;
      }
    }

    function pickExam(typeKey, n){
      const pool = QUESTION_BANK.filter(q => q.typeKey === typeKey);
      if(pool.length < n){
        throw new Error(`No hay suficientes preguntas en el banco (${pool.length}) para generar ${n}.`);
      }
      return shuffle([...pool]).slice(0, n);
    }

    function renderOption(idx, opt){
      const name = `q_${idx}`;
      const id = `${name}_${opt.k}`;
      const label = opt.k.toUpperCase();
      return `
        <label class="opt" for="${id}">
          <input type="radio" id="${id}" name="${name}" value="${opt.k}" ${locked ? 'disabled' : ''} />
          <span><b>${label}.</b> ${escapeHtml(opt.t)}</span>
        </label>
      `;
    }

    function renderExam(){
      quizEl.innerHTML = '';
      results.style.display = 'none';
      review.innerHTML = '';

      currentExam.forEach((q, idx) => {
        const qWrap = document.createElement('div');
        qWrap.className = 'q';
        qWrap.dataset.qid = q.id;

        const optsHtml = q.options.map(opt => renderOption(idx, opt)).join("");

        qWrap.innerHTML = `
          <div class="qhead">
            <div class="qnum">${idx + 1}</div>
            <p class="qtext">${escapeHtml(q.q)}</p>
          </div>
          <div class="options">
            ${optsHtml}
          </div>
          <div style="margin-top:10px;">
            <button type="button" class="secondary" data-clear="${idx}" style="padding:10px 12px;">
              Dejar en blanco
            </button>
          </div>
        `;

        quizEl.appendChild(qWrap);
      });
    }

    function getAnswers(){
      const answers = [];
      currentExam.forEach((q, idx) => {
        const name = `q_${idx}`;
        const chosen = document.querySelector(`input[name="${name}"]:checked`);
        answers.push({ id: q.id, chosen: chosen ? chosen.value : null });
      });
      return answers;
    }

    function renderReviewItem(index, q, chosen, status){
      const node = document.createElement('div');
      node.className = 'q';

      const chosenTxt = chosen ? chosen.toUpperCase() : '—';
      const correctTxt = q.correct.toUpperCase();

      const optionsHtml = q.options.map(o => {
        const isCorrect = o.k === q.correct;
        const isChosen = chosen === o.k;

        let badge = '';
        if(isCorrect) badge += `<span class="tag good" style="margin-left:8px;">CORRECTA</span>`;
        if(isChosen && isCorrect) badge += `<span class="tag good" style="margin-left:8px;">TU RESPUESTA</span>`;
        if(isChosen && !isCorrect) badge += `<span class="tag bad" style="margin-left:8px;">TU RESPUESTA</span>`;

        const extraStyle = isCorrect
          ? 'border:1px solid rgba(57,217,138,.45); background: rgba(57,217,138,.08);'
          : (isChosen && !isCorrect)
            ? 'border:1px solid rgba(255,92,122,.45); background: rgba(255,92,122,.07);'
            : '';

        return `
          <div class="opt" style="${extraStyle}">
            <div style="min-width:28px; font-weight:900; color: var(--muted);">${escapeHtml(o.k.toUpperCase())}.</div>
            <div style="flex:1;">
              <div style="font-size:14px;">${escapeHtml(o.t)} ${badge}</div>
            </div>
          </div>
        `;
      }).join('');

      node.innerHTML = `
        <div class="qhead">
          <div class="qnum">${index + 1}</div>
          <div style="flex:1;">
            <p class="qtext" style="margin:0;">${escapeHtml(q.q)}</p>
            <div style="margin-top:8px;">
              <span class="tag ${status.type}">${status.label}</span>
            </div>
            <div class="answerline">Tu respuesta: <b>${chosenTxt}</b> · Correcta: <b>${correctTxt}</b></div>
            <div class="options" style="margin-top:10px;">${optionsHtml}</div>
            <div class="why">${escapeHtml(q.why || "")}</div>
          </div>
        </div>
      `;

      return node;
    }

    function evaluate(){
      if(locked) return;
      locked = true;

      const typeKey = getActiveTypeKey();
      const cfg = getTypeCfg(typeKey);
      const answers = getAnswers();

      let ok = 0, bad = 0, blank = 0;
      let score = 0;

      const byId = new Map(currentExam.map(q => [q.id, q]));
      const reviewNodes = [];

      answers.forEach((a, i) => {
        const q = byId.get(a.id);
        const chosen = a.chosen;
        const correct = q.correct;

        let status;
        if(!chosen){
          blank++;
          status = { type: 'blank', label: 'EN BLANCO' };
        } else if(chosen === correct){
          ok++;
          status = { type: 'good', label: 'CORRECTA' };
        } else {
          bad++;
          status = { type: 'bad', label: 'INCORRECTA' };
        }

        if(cfg.scoringMode === "points"){
          const n = Number(elSize.value);
          const s = SCORING[n];
          if(!chosen) score += s.blank;
          else if(chosen === correct) score += s.ok;
          else score += s.bad;
        } else {
          score = ok;
        }

        reviewNodes.push(renderReviewItem(i, q, chosen, status));
      });

      document.querySelectorAll('#quiz input[type="radio"]').forEach(r => r.disabled = true);
      document.querySelectorAll('#quiz button[data-clear]').forEach(b => b.disabled = true);

      const total = currentExam.length;

      if(cfg.scoringMode === "count"){
        totalScoreEl.textContent = `${ok} / ${total}`;
        summaryTextEl.textContent = `${ok} bien · ${bad} mal · ${blank} en blanco`;
      } else {
        totalScoreEl.textContent = fmt(score);
        summaryTextEl.textContent = `${ok} bien · ${bad} mal · ${blank} en blanco`;
      }

      review.innerHTML = '';
      reviewNodes.forEach(n => review.appendChild(n));

      results.style.display = 'block';
      results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function clearQuestion(idx){
      const name = `q_${idx}`;
      document.querySelectorAll(`#quiz input[name="${name}"]`).forEach(r => {
        r.checked = false;
        r.dataset.wasChecked = '0';
      });
    }

    function resetAll(){
      locked = false;
      currentExam = [];
      quizEl.innerHTML = '';
      review.innerHTML = '';
      results.style.display = 'none';
      quizSection.classList.add('hide');
      actions.classList.add('hide');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function start(){
      locked = false;

      const typeKey = getActiveTypeKey();
      const n = getCountForSelection();

      currentExam = pickExam(typeKey, n);
      renderExam();

      quizSection.classList.remove('hide');
      actions.classList.remove('hide');

      quizSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ==========================================================
    //  EVENTS
    // ==========================================================
    elUnit.addEventListener('change', () => {
      rebuildExamTypeOptions();
    });

    elExamType.addEventListener('change', () => {
      applyTypeUI();
      setRulesUI();
    });

    elSize.addEventListener('change', setRulesUI);

    startBtn.addEventListener('click', () => {
      try { start(); }
      catch(e){ alert(e.message); }
    });

    evaluateBtn.addEventListener('click', evaluate);
    restartBtn.addEventListener('click', resetAll);

    // Dejar en blanco
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-clear]');
      if(!btn) return;
      if(locked) return;
      clearQuestion(Number(btn.dataset.clear));
    });

    // Tap again to unselect (mobile-friendly)
    document.addEventListener('click', (e) => {
      const r = e.target.closest('#quiz input[type="radio"]');
      if(!r) return;
      if(locked) return;

      if(r.dataset.wasChecked === '1'){
        e.preventDefault();
        r.checked = false;
        r.dataset.wasChecked = '0';
      } else {
        const name = r.name;
        document.querySelectorAll(`#quiz input[name="${name}"]`).forEach(x => x.dataset.wasChecked = '0');
        r.dataset.wasChecked = '1';
      }
    }, true);

    // Result footer actions
    newExamBtn.addEventListener('click', () => {
      resetAll();
      start();
    });

    backTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    restartFromResultsBtn.addEventListener('click', resetAll);

    changeConfigBtn.addEventListener('click', () => {
      resetAll();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Init
    rebuildExamTypeOptions();
    setRulesUI();
  </script>
</body>
</html>
