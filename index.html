<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simulacro Celador - Unidades 1 y 2</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#121b2d;
      --muted:#9fb0d0;
      --text:#eaf0ff;
      --accent:#6ea8fe;
      --good:#39d98a;
      --bad:#ff5c7a;
      --warn:#ffd166;
      --border:rgba(255,255,255,.12);
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:18px;
    }

    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 20% -10%, rgba(110,168,254,.25), transparent 55%),
                  radial-gradient(1000px 700px at 90% 0%, rgba(57,217,138,.18), transparent 50%),
                  var(--bg);
      color:var(--text);
      line-height:1.35;
    }

    .wrap{max-width:980px; margin:0 auto; padding:20px 14px 80px;}

    header{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin:8px 0 18px;
    }

    .title{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    h1{margin:0; font-size:22px; letter-spacing:.2px;}
    .subtitle{color:var(--muted); font-size:13px; margin-top:4px;}

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding:14px;
    }

    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .row > *{flex:1 1 200px;}

    label{display:block; font-size:12px; color:var(--muted); margin:0 0 6px;}

    select, button{
      width:100%;
      background: rgba(255,255,255,.06);
      border:1px solid var(--border);
      color: var(--text);
      padding:12px 12px;
      border-radius: 14px;
      font-size:14px;
      outline:none;
    }

    button{
      cursor:pointer;
      background: linear-gradient(180deg, rgba(110,168,254,.95), rgba(110,168,254,.65));
      border:none;
      font-weight:700;
      letter-spacing:.2px;
      transition: transform .06s ease, filter .15s ease;
    }
    button:active{transform: translateY(1px) scale(.99);}
    button.secondary{
      background: rgba(255,255,255,.08);
      border:1px solid var(--border);
      font-weight:600;
    }

    .pill{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:8px 10px;
      border-radius: 999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.05);
      color: var(--muted);
      font-size:12px;
      white-space:nowrap;
    }
    .pill b{color:var(--text); font-weight:800;}

    .quiz{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:12px;
    }

    .q{
      padding:14px;
      border-radius: var(--radius);
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
    }

    .qhead{display:flex; gap:10px; align-items:flex-start; justify-content:space-between;}

    .qnum{
      min-width:44px;
      text-align:center;
      padding:8px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border:1px solid var(--border);
      color: var(--muted);
      font-weight:800;
      font-size:12px;
    }

    .qtext{font-size:15px; margin:0; padding-top:2px;}

    .options{margin-top:10px; display:flex; flex-direction:column; gap:8px;}

    .opt{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:10px 10px;
      border-radius: 14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
    }

    .opt input{margin-top:3px;}
    .opt span{color: var(--text); font-size:14px;}

    .footer-actions{
      position: sticky;
      bottom: 12px;
      z-index: 10;
      margin-top: 16px;
    }

    .footer-actions .card{padding:12px;}

    .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    @media (max-width:700px){
      .grid2{grid-template-columns:1fr;}
      .title{flex-direction:column;}
    }

    .results{
      margin-top:14px;
      display:none;
    }

    .results .summary{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }

    .kpi{
      flex:1 1 220px;
      border:1px solid var(--border);
      border-radius: var(--radius);
      padding:12px;
      background: rgba(255,255,255,.04);
    }

    .kpi .label{color:var(--muted); font-size:12px;}
    .kpi .value{font-size:22px; font-weight:900; margin-top:4px;}

    .tag{display:inline-block; padding:6px 10px; border-radius:999px; font-weight:800; font-size:12px;}
    .tag.good{background: rgba(57,217,138,.14); color: var(--good); border:1px solid rgba(57,217,138,.35);}
    .tag.bad{background: rgba(255,92,122,.12); color: var(--bad); border:1px solid rgba(255,92,122,.35);}
    .tag.blank{background: rgba(255,209,102,.12); color: var(--warn); border:1px solid rgba(255,209,102,.35);}

    .review{margin-top:12px; display:flex; flex-direction:column; gap:10px;}
    .review .q{background: rgba(255,255,255,.03);}

    .answerline{margin-top:10px; color:var(--muted); font-size:13px;}
    .answerline b{color:var(--text);}
    .why{margin-top:8px; font-size:13px; color:var(--muted);}

    .notice{color:var(--muted); font-size:12px; margin-top:10px;}
    .hide{display:none !important;}

    .disabled{
      opacity:.6;
      filter: grayscale(.1);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">
        <div>
          <h1>Simulacro (Celador) • Unidades 1 y 2</h1>
          <div class="subtitle">Sin backend. Exámenes aleatorios. Pensado para móvil.</div>
        </div>
        <div class="pill" id="scorePill">Puntuación: <b id="pillPoints">-</b></div>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <label for="unit">1) Unidad</label>
            <select id="unit">
              <option value="u1">Unidad 1</option>
              <option value="u2">Unidad 2</option>
            </select>
          </div>

          <div>
            <label for="examType">2) Tipo de examen</label>
            <select id="examType"></select>
          </div>

          <div id="sizeWrap">
            <label for="size">3) Nº preguntas</label>
            <select id="size">
              <option value="10">10 preguntas</option>
              <option value="20">20 preguntas</option>
              <option value="30">30 preguntas</option>
            </select>
          </div>

          <div>
            <label>&nbsp;</label>
            <button id="startBtn">Generar examen</button>
          </div>
        </div>
        <div class="notice" id="rulesText"></div>
      </div>
    </header>

    <main>
      <section id="quizSection" class="card hide">
        <div class="quiz" id="quiz"></div>
        <div class="notice">Tip: puedes tocar la misma opción para desmarcarla, o usar “Dejar en blanco”.</div>
      </section>

      <div class="footer-actions hide" id="actions">
        <div class="card grid2">
          <button id="evaluateBtn">EVALUAR</button>
          <button id="restartBtn" class="secondary">Reiniciar</button>
        </div>
      </div>

      <section id="results" class="results card">
        <div class="summary">
          <div class="kpi">
            <div class="label" id="scoreLabel">Puntuación total</div>
            <div class="value" id="totalScore">0</div>
          </div>
          <div class="kpi">
            <div class="label">Resumen</div>
            <div class="value" id="summaryText">-</div>
          </div>
          <div class="kpi">
            <div class="label">Reglas</div>
            <div class="value" id="rulesKpi" style="font-size:14px; font-weight:800;">-</div>
          </div>
        </div>

        <div class="review" id="review"></div>

        <div class="card" style="margin-top:14px;">
          <div class="grid2">
            <button id="newExamBtn">Nuevo examen (mismo tipo)</button>
            <button id="backTopBtn" class="secondary">Volver arriba</button>
          </div>
          <div class="grid2" style="margin-top:10px;">
            <button id="restartFromResultsBtn" class="secondary">Reiniciar (borrar todo)</button>
            <button id="changeConfigBtn" class="secondary">Cambiar unidad / tipo</button>
          </div>
          <div class="notice">Tip: “Nuevo examen” genera otra combinación aleatoria.</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // ==========================================================
    //  CONFIG: unidades y tipos
    // ==========================================================
    const EXAM_TYPES = {
      // Unidad 1 (lo que ya tenías, y mantenemos)
      u1_ud1:   { unit:"u1", label:"U1 • Preguntas (Anatomía básica)", mode:"mcq", sizeMode:"variable", scoringMode:"points" },
      u1_sem1:  { unit:"u1", label:"U1 • Seminario (TME / prevención)", mode:"mcq", sizeMode:"variable", scoringMode:"points" },

      // BONUS opcional (si luego quieres rellenarlo mejor)
      // Por ahora lo dejo funcional con un banco pequeño.
      u1_test17:{ unit:"u1", label:"U1 • Cuestionario (17 preguntas)", mode:"mcq", sizeMode:"fixed", fixedCount:17, scoringMode:"count" },
      u1_vf:    { unit:"u1", label:"U1 • Verdadero / Falso", mode:"vf",  sizeMode:"fixed", fixedCount:null, scoringMode:"count" },

      // Unidad 2 (solo 10/20/30)
      u2_ud2:   { unit:"u2", label:"U2 • Movilización y traslado (Nivel 1)", mode:"mcq", sizeMode:"variable", scoringMode:"points" },
    };

    // ==========================================================
    //  BANCO DE PREGUNTAS
    //  Formato normalizado:
    //   {
    //     id, typeKey,
    //     q,
    //     options: [{k:'a', t:'...'}, {k:'b', t:'...'}, ...],
    //     correct:'a',
    //     why:'...'
    //   }
    // ==========================================================

    const QUESTION_BANK = [
      // =========================
      // U1 (recortado a lo esencial: usamos tus preguntas)
      // =========================
      { id:"ud1-001", typeKey:"u1_ud1", q:"¿Cuál es la unidad mínima de la vida?", options:[
        {k:"a",t:"El tejido"},{k:"b",t:"La célula"},{k:"c",t:"El órgano"}
      ], correct:"b", why:"La célula es la unidad mínima de la vida; tejidos y órganos son niveles superiores." },

      { id:"ud1-002", typeKey:"u1_ud1", q:"¿Qué estudia la Citología?", options:[
        {k:"a",t:"Las células"},{k:"b",t:"Los huesos"},{k:"c",t:"Los órganos"}
      ], correct:"a", why:"La citología estudia las células." },

      { id:"ud1-003", typeKey:"u1_ud1", q:"Las células humanas son principalmente:", options:[
        {k:"a",t:"Procariotas"},{k:"b",t:"Eucariotas"},{k:"c",t:"Bacterianas"}
      ], correct:"b", why:"Las células humanas son eucariotas (con núcleo y orgánulos)." },

      { id:"ud1-004", typeKey:"u1_ud1", q:"¿Qué rama estudia los tejidos biológicos?", options:[
        {k:"a",t:"Histología"},{k:"b",t:"Citología"},{k:"c",t:"Fisiología"}
      ], correct:"a", why:"La histología se ocupa del estudio de los tejidos." },

      { id:"ud1-005", typeKey:"u1_ud1", q:"El sistema musculoesquelético está constituido por:", options:[
        {k:"a",t:"Sistema esquelético y músculos"},{k:"b",t:"Sistema endocrino y nervioso"},{k:"c",t:"Sistema digestivo y excretor"}
      ], correct:"a", why:"Incluye huesos/articulaciones y músculos/tendones." },

      { id:"ud1-008", typeKey:"u1_ud1", q:"¿Dónde se produce la hematopoyesis?", options:[
        {k:"a",t:"Médula ósea roja"},{k:"b",t:"Médula ósea amarilla"},{k:"c",t:"Cartílago articular"}
      ], correct:"a", why:"En la médula ósea roja se producen glóbulos rojos, blancos y plaquetas." },

      { id:"ud1-011", typeKey:"u1_ud1", q:"Las células que construyen hueso y sintetizan matriz ósea son:", options:[
        {k:"a",t:"Osteoclastos"},{k:"b",t:"Osteoblastos"},{k:"c",t:"Osteocitos"}
      ], correct:"b", why:"Los osteoblastos forman hueso; los osteoclastos lo reabsorben; los osteocitos son maduros." },

      { id:"ud1-017", typeKey:"u1_ud1", q:"Las vértebras cervicales son:", options:[
        {k:"a",t:"12"},{k:"b",t:"7"},{k:"c",t:"5"}
      ], correct:"b", why:"Hay 7 vértebras cervicales." },

      { id:"ud1-020", typeKey:"u1_ud1", q:"Las costillas verdaderas son:", options:[
        {k:"a",t:"7 pares"},{k:"b",t:"5 pares"},{k:"c",t:"12 pares"}
      ], correct:"a", why:"Las 7 primeras se unen al esternón (verdaderas)." },

      { id:"ud1-031", typeKey:"u1_ud1", q:"El intercambio gaseoso principal ocurre en:", options:[
        {k:"a",t:"Bronquios"},{k:"b",t:"Alvéolos"},{k:"c",t:"Faringe"}
      ], correct:"b", why:"En los alvéolos se realiza el intercambio O2/CO2." },

      { id:"ud1-040", typeKey:"u1_ud1", q:"Capas del corazón (de interior a exterior):", options:[
        {k:"a",t:"Pericardio, miocardio, endocardio"},{k:"b",t:"Endocardio, miocardio, pericardio"},{k:"c",t:"Pleura, peritoneo, periostio"}
      ], correct:"b", why:"Endocardio (interior), miocardio, pericardio (exterior)." },

      // --- Seminario 1 (mantenemos estilo)
      { id:"sem-011", typeKey:"u1_sem1", q:"La mecánica corporal es:", options:[
        {k:"a",t:"Uso eficaz, coordinado y seguro del cuerpo para moverse y mantener equilibrio"},{k:"b",t:"Solo levantar pesas"},{k:"c",t:"Solo estiramientos"}
      ], correct:"a", why:"Incluye alineación, equilibrio y movimiento coordinado." },

      { id:"sem-013", typeKey:"u1_sem1", q:"Base de apoyo amplia y centro de gravedad bajo:", options:[
        {k:"a",t:"Aumentan la estabilidad"},{k:"b",t:"Disminuyen estabilidad"},{k:"c",t:"No afectan"}
      ], correct:"a", why:"Principio básico: más base y CG bajo = más estabilidad." },

      { id:"sem-014", typeKey:"u1_sem1", q:"Mover una carga cerca del centro de gravedad:", options:[
        {k:"a",t:"Requiere menos esfuerzo"},{k:"b",t:"Requiere más esfuerzo"},{k:"c",t:"Es igual"}
      ], correct:"a", why:"Cuanto más cerca, menor brazo de palanca y menor esfuerzo." },

      { id:"sem-021", typeKey:"u1_sem1", q:"Peso máximo recomendado para manipulación de cargas en sedestación:", options:[
        {k:"a",t:"5 kg"},{k:"b",t:"25 kg"},{k:"c",t:"50 kg"}
      ], correct:"a", why:"Se recomienda no superar 5 kg en sedestación." },

      { id:"sem-023", typeKey:"u1_sem1", q:"Al levantar una carga del suelo, se aconseja:", options:[
        {k:"a",t:"Flexionar rodillas y mantener espalda recta"},{k:"b",t:"Flexionar la columna lumbar"},{k:"c",t:"Girar el tronco con peso en alto"}
      ], correct:"a", why:"Usar rodillas/caderas y minimizar participación de columna." },

      // --- Cuestionario 17 (banco pequeño pero funcional; puedes ampliarlo luego)
      { id:"q17-01", typeKey:"u1_test17", q:"¿Qué estructura separa cavidad torácica y abdominal?", options:[
        {k:"a",t:"Diafragma"},{k:"b",t:"Pleura"},{k:"c",t:"Periostio"}
      ], correct:"a", why:"El diafragma es el músculo que separa tórax y abdomen y participa en la respiración." },
      { id:"q17-02", typeKey:"u1_test17", q:"¿Cuántos lóbulos tiene el pulmón izquierdo?", options:[
        {k:"a",t:"1"},{k:"b",t:"2"},{k:"c",t:"3"}
      ], correct:"b", why:"El pulmón izquierdo tiene 2 lóbulos; el derecho 3." },
      { id:"q17-03", typeKey:"u1_test17", q:"La unidad funcional del riñón es:", options:[
        {k:"a",t:"Alvéolo"},{k:"b",t:"Neurona"},{k:"c",t:"Nefrona"}
      ], correct:"c", why:"La nefrona filtra la sangre y forma la orina." },
      { id:"q17-04", typeKey:"u1_test17", q:"La sangre llega al corazón desde el cuerpo por:", options:[
        {k:"a",t:"Venas cavas"},{k:"b",t:"Aorta"},{k:"c",t:"Arteria pulmonar"}
      ], correct:"a", why:"Las venas cavas desembocan en la aurícula derecha." },
      { id:"q17-05", typeKey:"u1_test17", q:"El sistema nervioso central está formado por:", options:[
        {k:"a",t:"Encéfalo y médula espinal"},{k:"b",t:"Nervios y ganglios"},{k:"c",t:"Solo médula"}
      ], correct:"a", why:"SNC = encéfalo + médula espinal." },
      { id:"q17-06", typeKey:"u1_test17", q:"¿Qué estructura evita el paso de alimentos a la tráquea?", options:[
        {k:"a",t:"Epiglotis"},{k:"b",t:"Laringe"},{k:"c",t:"Bronquio"}
      ], correct:"a", why:"La epiglotis cierra la entrada laríngea durante la deglución." },
      { id:"q17-07", typeKey:"u1_test17", q:"Las plaquetas participan principalmente en:", options:[
        {k:"a",t:"Defensa"},{k:"b",t:"Coagulación"},{k:"c",t:"Intercambio gaseoso"}
      ], correct:"b", why:"Ayudan a taponar heridas y formar coágulos." },
      { id:"q17-08", typeKey:"u1_test17", q:"La tráquea se mantiene abierta por:", options:[
        {k:"a",t:"Anillos cartilaginosos"},{k:"b",t:"Vellosidades"},{k:"c",t:"Músculo liso circular"}
      ], correct:"a", why:"Los anillos de cartílago evitan el colapso." },
      { id:"q17-09", typeKey:"u1_test17", q:"El esqueleto axial incluye:", options:[
        {k:"a",t:"Cabeza, cuello y tronco"},{k:"b",t:"Solo extremidades"},{k:"c",t:"Solo pelvis"}
      ], correct:"a", why:"Axial = cabeza, cuello y tronco." },
      { id:"q17-10", typeKey:"u1_test17", q:"Un hueso sesamoideo típico es:", options:[
        {k:"a",t:"Rótula"},{k:"b",t:"Húmero"},{k:"c",t:"Esternón"}
      ], correct:"a", why:"La rótula es el ejemplo clásico." },
      { id:"q17-11", typeKey:"u1_test17", q:"Los alvéolos son importantes porque:", options:[
        {k:"a",t:"Producen bilis"},{k:"b",t:"Realizan intercambio O2/CO2"},{k:"c",t:"Forman plaquetas"}
      ], correct:"b", why:"Allí ocurre el intercambio gaseoso." },
      { id:"q17-12", typeKey:"u1_test17", q:"¿Cuál es el intestino delgado?", options:[
        {k:"a",t:"Duodeno, yeyuno e íleon"},{k:"b",t:"Ciego, colon y recto"},{k:"c",t:"Faringe, laringe y tráquea"}
      ], correct:"a", why:"Son las 3 porciones del intestino delgado." },
      { id:"q17-13", typeKey:"u1_test17", q:"Los osteoclastos se encargan de:", options:[
        {k:"a",t:"Formar hueso"},{k:"b",t:"Reabsorber/destruir hueso"},{k:"c",t:"Nutrir el cartílago"}
      ], correct:"b", why:"Osteoclastos = destrucción ósea." },
      { id:"q17-14", typeKey:"u1_test17", q:"La diástole es:", options:[
        {k:"a",t:"Contracción"},{k:"b",t:"Relajación/llenado"},{k:"c",t:"Paro cardiaco"}
      ], correct:"b", why:"Diástole = relajación y llenado." },
      { id:"q17-15", typeKey:"u1_test17", q:"Los nervios craneales son:", options:[
        {k:"a",t:"12 pares"},{k:"b",t:"31 pares"},{k:"c",t:"7 pares"}
      ], correct:"a", why:"Del encéfalo salen 12 pares." },
      { id:"q17-16", typeKey:"u1_test17", q:"El músculo cardíaco es:", options:[
        {k:"a",t:"Liso y voluntario"},{k:"b",t:"Estriado e involuntario"},{k:"c",t:"Liso e involuntario"}
      ], correct:"b", why:"Es estriado, pero de control involuntario." },
      { id:"q17-17", typeKey:"u1_test17", q:"El colon sigmoideo está:", options:[
        {k:"a",t:"Antes del recto"},{k:"b",t:"Antes del duodeno"},{k:"c",t:"Dentro del estómago"}
      ], correct:"a", why:"Va tras el colon descendente y antes del recto." },

      // --- Verdadero/Falso (u1_vf) -> 2 opciones
      { id:"vf-01", typeKey:"u1_vf", q:"La higiene de manos es la medida más eficaz para prevenir infecciones cruzadas.", options:[
        {k:"a",t:"Verdadero"},{k:"b",t:"Falso"}
      ], correct:"a", why:"Es una medida clave para evitar transmisión de microorganismos." },
      { id:"vf-02", typeKey:"u1_vf", q:"En sedestación siempre disminuye la carga sobre los discos lumbares.", options:[
        {k:"a",t:"Verdadero"},{k:"b",t:"Falso"}
      ], correct:"b", why:"A menudo aumenta por la basculación posterior de la pelvis y rectificación lumbar." },
      { id:"vf-03", typeKey:"u1_vf", q:"Los músculos grandes se fatigan con menor rapidez que los pequeños.", options:[
        {k:"a",t:"Verdadero"},{k:"b",t:"Falso"}
      ], correct:"a", why:"Principio básico en mecánica corporal." },
      { id:"vf-04", typeKey:"u1_vf", q:"Es recomendable girar el tronco con carga en alto para ahorrar pasos.", options:[
        {k:"a",t:"Verdadero"},{k:"b",t:"Falso"}
      ], correct:"b", why:"Aumenta el riesgo de lesión; se gira con pies/cadera/rodillas." },
      { id:"vf-05", typeKey:"u1_vf", q:"La lordosis cervical presenta concavidad posterior.", options:[
        {k:"a",t:"Verdadero"},{k:"b",t:"Falso"}
      ], correct:"a", why:"Lordosis: concavidad posterior en cervical y lumbar." },

      // =========================
      // U2 • Movilización y traslado (Nivel 1) — banco ampliado (>30)
      // Basado en conceptos del dossier UD2 (higiene, posiciones, material, IAP, traslados, oxígeno, etc.)
      // =========================

      // Higiene / manos
      { id:"u2-001", typeKey:"u2_ud2", q:"¿Cuál es la medida más eficaz para luchar contra la infección hospitalaria?", options:[
        {k:"a",t:"Lavado/higiene de manos"},{k:"b",t:"Usar doble guante siempre"},{k:"c",t:"Abrir ventanas"}
      ], correct:"a", why:"La higiene de manos reduce la transmisión y la infección cruzada." },

      { id:"u2-002", typeKey:"u2_ud2", q:"Los “cinco momentos” de higiene de manos incluyen:", options:[
        {k:"a",t:"Antes del contacto con el paciente"},{k:"b",t:"Solo al entrar al hospital"},{k:"c",t:"Solo después de comer"}
      ], correct:"a", why:"Se incluyen momentos antes/después del contacto, tareas asépticas y exposición a fluidos." },

      { id:"u2-003", typeKey:"u2_ud2", q:"Si las manos están visiblemente sucias, se recomienda:", options:[
        {k:"a",t:"Solución alcohólica siempre"},{k:"b",t:"Agua y jabón"},{k:"c",t:"Solo guantes"}
      ], correct:"b", why:"Con suciedad visible se usa agua y jabón." },

      // Principios básicos movilización
      { id:"u2-004", typeKey:"u2_ud2", q:"Principio básico antes de movilizar a un paciente:", options:[
        {k:"a",t:"Actuar rápido sin pensar"},{k:"b",t:"Reflexionar antes de actuar"},{k:"c",t:"No preparar material"}
      ], correct:"b", why:"Se recomienda reflexionar y planificar antes de iniciar la maniobra." },

      { id:"u2-005", typeKey:"u2_ud2", q:"Al movilizar, es recomendable:", options:[
        {k:"a",t:"Dar órdenes breves y concretas"},{k:"b",t:"Hablar muy largo y sin parar"},{k:"c",t:"No coordinarse con el compañero"}
      ], correct:"a", why:"Órdenes claras facilitan la colaboración y la seguridad." },

      { id:"u2-006", typeKey:"u2_ud2", q:"En mecánica corporal para movilizar, se recomienda:", options:[
        {k:"a",t:"Espalda recta y flexionar piernas"},{k:"b",t:"Espalda flexionada y piernas rectas"},{k:"c",t:"Cargar lejos del cuerpo"}
      ], correct:"a", why:"Piernas flexionadas y espalda recta reducen carga lumbar." },

      { id:"u2-007", typeKey:"u2_ud2", q:"Para aumentar la estabilidad del profesional durante una movilización:", options:[
        {k:"a",t:"Juntar los pies"},{k:"b",t:"Separar los pies (ampliar base de sustentación)"},{k:"c",t:"Ponerse de puntillas"}
      ], correct:"b", why:"Base amplia = más estabilidad." },

      { id:"u2-008", typeKey:"u2_ud2", q:"Un objetivo importante en movilización es:", options:[
        {k:"a",t:"Buscar participación del paciente"},{k:"b",t:"Evitar que el paciente participe"},{k:"c",t:"No usar ayudas técnicas"}
      ], correct:"a", why:"La participación del paciente reduce esfuerzo y mejora seguridad." },

      { id:"u2-009", typeKey:"u2_ud2", q:"Al dar instrucciones al paciente durante la movilización, se recomienda evitar:", options:[
        {k:"a",t:"Decir “derecha/izquierda”"},{k:"b",t:"Decir “cuando te lo diga”"},{k:"c",t:"Dar instrucciones breves"}
      ], correct:"a", why:"Se recomienda evitar derecha/izquierda para reducir confusiones." },

      { id:"u2-010", typeKey:"u2_ud2", q:"Antes de movilizar, hay que identificar puntos de “impotencia funcional” como:", options:[
        {k:"a",t:"Dolor, vías, yesos o drenajes"},{k:"b",t:"Color de ojos"},{k:"c",t:"Preferencias de comida"}
      ], correct:"a", why:"Son elementos que condicionan la movilización." },

      // Posiciones corporales
      { id:"u2-011", typeKey:"u2_ud2", q:"Decúbito supino (dorsal) significa:", options:[
        {k:"a",t:"Tumbado sobre la espalda"},{k:"b",t:"Tumbado sobre el abdomen"},{k:"c",t:"Sentado a 90º"}
      ], correct:"a", why:"Supino = boca arriba." },

      { id:"u2-012", typeKey:"u2_ud2", q:"Decúbito prono (ventral) significa:", options:[
        {k:"a",t:"Tumbado sobre la espalda"},{k:"b",t:"Tumbado sobre el abdomen"},{k:"c",t:"De pie"}
      ], correct:"b", why:"Prono = boca abajo." },

      { id:"u2-013", typeKey:"u2_ud2", q:"La posición de Fowler se caracteriza por:", options:[
        {k:"a",t:"Cabezal elevado ~45º-60º"},{k:"b",t:"Cabeza más baja que el tronco"},{k:"c",t:"Cama inclinada con cabeza arriba y pies abajo (plano completo)"}
      ], correct:"a", why:"Fowler: paciente en supino con cabezal elevado." },

      { id:"u2-014", typeKey:"u2_ud2", q:"La posición de Trendelenburg es:", options:[
        {k:"a",t:"Cabeza por encima de las piernas"},{k:"b",t:"Cabeza más baja que el tronco"},{k:"c",t:"Paciente sentado con piernas colgando"}
      ], correct:"b", why:"Trendelenburg: inclinación con cabeza baja." },

      { id:"u2-015", typeKey:"u2_ud2", q:"La posición anti-Trendelenburg es:", options:[
        {k:"a",t:"Cabeza por encima de los miembros inferiores"},{k:"b",t:"Cabeza más baja que el tronco"},{k:"c",t:"Decúbito prono"}
      ], correct:"a", why:"Anti-Trendelenburg: cabeza más alta que piernas." },

      { id:"u2-016", typeKey:"u2_ud2", q:"La “posición de seguridad” se usa sobre todo para:", options:[
        {k:"a",t:"Evitar broncoaspiración en caso de vómito"},{k:"b",t:"Aumentar la tensión lumbar"},{k:"c",t:"Hacer pruebas de visión"}
      ], correct:"a", why:"En lateral facilita drenaje de vómito y reduce riesgo de aspiración." },

      // Material (cama, silla, disco, transfer, grúa, trapecio)
      { id:"u2-017", typeKey:"u2_ud2", q:"La barandilla de la cama tiene como función principal:", options:[
        {k:"a",t:"Aumentar la velocidad de traslado"},{k:"b",t:"Proteger al paciente y evitar caídas"},{k:"c",t:"Sujetar el palo de suero"}
      ], correct:"b", why:"Su función es seguridad/prevención de caídas." },

      { id:"u2-018", typeKey:"u2_ud2", q:"El pedal de freno de la cama sirve para:", options:[
        {k:"a",t:"Bloquear las ruedas"},{k:"b",t:"Elevar el cabezal"},{k:"c",t:"Subir el caudal de O2"}
      ], correct:"a", why:"Frena las ruedas para estabilidad." },

      { id:"u2-019", typeKey:"u2_ud2", q:"El “tope de pies” de la cama ayuda a:", options:[
        {k:"a",t:"Evitar que el paciente se resbale al elevar el cabezal"},{k:"b",t:"Conectar el suero"},{k:"c",t:"Inmovilizar una fractura"}
      ], correct:"a", why:"Evita deslizamiento del paciente." },

      { id:"u2-020", typeKey:"u2_ud2", q:"El sillón móvil suele incluir:", options:[
        {k:"a",t:"Ruedas y reposapiés abatible"},{k:"b",t:"Solo respaldo fijo sin ruedas"},{k:"c",t:"Manómetro digital de O2"}
      ], correct:"a", why:"Sillón móvil: ruedas, reposapiés, más posiciones." },

      { id:"u2-021", typeKey:"u2_ud2", q:"El disco giratorio se utiliza principalmente para:", options:[
        {k:"a",t:"Girar al paciente en bipedestación cuando no puede dar pasos"},{k:"b",t:"Elevar el paciente del suelo"},{k:"c",t:"Medir saturación"}
      ], correct:"a", why:"Facilita la rotación sin que el paciente tenga que pivotar con pasos." },

      { id:"u2-022", typeKey:"u2_ud2", q:"El transfer (Rollbord®) sirve para:", options:[
        {k:"a",t:"Transferir pacientes facilitando el deslizamiento"},{k:"b",t:"Inmovilizar fracturas de fémur"},{k:"c",t:"Ventilar al paciente"}
      ], correct:"a", why:"Se coloca bajo el paciente para deslizar y transferir de forma segura." },

      { id:"u2-023", typeKey:"u2_ud2", q:"Las grúas ayudan especialmente en:", options:[
        {k:"a",t:"Sedestación e higiene de pacientes dependientes"},{k:"b",t:"Medir glucosa"},{k:"c",t:"Hacer radiografías"}
      ], correct:"a", why:"Grúa: movilización de pacientes sin movilidad o muy voluminosos." },

      { id:"u2-024", typeKey:"u2_ud2", q:"Tipos habituales de grúa:", options:[
        {k:"a",t:"Grúa de techo y grúa móvil"},{k:"b",t:"Grúa hidráulica y grúa nuclear"},{k:"c",t:"Grúa manual y grúa eléctrica (únicos)"}
      ], correct:"a", why:"Se describen grúa de techo y grúa móvil." },

      { id:"u2-025", typeKey:"u2_ud2", q:"El trapecio en cama es recomendable cuando:", options:[
        {k:"a",t:"No hay afectación de extremidad superior o contraindicación médica"},{k:"b",t:"Siempre, aunque haya lesión de hombro"},{k:"c",t:"Solo en niños"}
      ], correct:"a", why:"Da independencia al paciente y ayuda al personal, si está indicado." },

      // Traslado: conceptos generales
      { id:"u2-026", typeKey:"u2_ud2", q:"La prioridad del celador en el traslado intrahospitalario es:", options:[
        {k:"a",t:"Rapidez máxima"},{k:"b",t:"Máximas condiciones de seguridad y confort"},{k:"c",t:"Evitar higiene de manos para ahorrar tiempo"}
      ], correct:"b", why:"Seguridad y confort del paciente son prioridad." },

      { id:"u2-027", typeKey:"u2_ud2", q:"El traslado empieza:", options:[
        {k:"a",t:"Al llegar al destino"},{k:"b",t:"Cuando se recibe la orden/petición de traslado"},{k:"c",t:"Cuando el paciente se duerme"}
      ], correct:"b", why:"Desde que se entrega la orden de traslado." },

      { id:"u2-028", typeKey:"u2_ud2", q:"Datos básicos que debemos conocer antes del traslado:", options:[
        {k:"a",t:"Nombre, punto de recogida, destino y material"},{k:"b",t:"Solo el destino"},{k:"c",t:"Solo el nombre"}
      ], correct:"a", why:"Información mínima para realizar el traslado correctamente." },

      // IAP
      { id:"u2-029", typeKey:"u2_ud2", q:"La Identificación Activa del Paciente (IAP) se realiza preguntando:", options:[
        {k:"a",t:"Nombre, apellidos y fecha de nacimiento"},{k:"b",t:"Dirección completa"},{k:"c",t:"Grupo musical favorito"}
      ], correct:"a", why:"Se pide verbalización y se comprueba con pulsera." },

      { id:"u2-030", typeKey:"u2_ud2", q:"Tras preguntar al paciente, debemos comprobar los datos con:", options:[
        {k:"a",t:"La historia clínica en el ordenador únicamente"},{k:"b",t:"La pulsera identificativa"},{k:"c",t:"La opinión del acompañante"}
      ], correct:"b", why:"La pulsera es referencia inmediata en el proceso." },

      { id:"u2-031", typeKey:"u2_ud2", q:"La pulsera identificativa debe contener al menos:", options:[
        {k:"a",t:"Nombre, apellidos, fecha de nacimiento e historia clínica"},{k:"b",t:"Nombre y cama"},{k:"c",t:"Solo historia clínica"}
      ], correct:"a", why:"Mínimo 4 indicadores." },

      { id:"u2-032", typeKey:"u2_ud2", q:"¿Quién es responsable de la correcta identificación del paciente?", options:[
        {k:"a",t:"Solo el médico"},{k:"b",t:"Todos los profesionales en contacto con el paciente"},{k:"c",t:"Solo el celador"}
      ], correct:"b", why:"La responsabilidad es compartida por profesionales en contacto." },

      // Silla de traslado y detalles
      { id:"u2-033", typeKey:"u2_ud2", q:"La silla de traslado se usa típicamente para:", options:[
        {k:"a",t:"Pacientes que no revisten gravedad"},{k:"b",t:"Reanimación cardiopulmonar"},{k:"c",t:"Cirugía mayor"}
      ], correct:"a", why:"Silla para pacientes estables." },

      { id:"u2-034", typeKey:"u2_ud2", q:"Al sentar a un paciente en una silla de traslado, debemos:", options:[
        {k:"a",t:"Sujetar/frenar la silla para evitar movimiento y caída"},{k:"b",t:"Dejar la silla libre para que gire"},{k:"c",t:"Quitar reposabrazos siempre sin mirar"}
      ], correct:"a", why:"Evita desplazamiento de la silla durante la sedestación." },

      { id:"u2-035", typeKey:"u2_ud2", q:"Elementos habituales en una silla de traslado:", options:[
        {k:"a",t:"Reposabrazos abatible/extraíble"},{k:"b",t:"Tanque de agua"},{k:"c",t:"Oxímetro integrado obligatorio"}
      ], correct:"a", why:"Suelen tener reposabrazos, reposapiés, soporte O2/portaobjetos, etc." },

      // Palo de suero
      { id:"u2-036", typeKey:"u2_ud2", q:"El palo porta-sueros se utiliza para:", options:[
        {k:"a",t:"Colgar sueros conectados al paciente"},{k:"b",t:"Medir tensión arterial"},{k:"c",t:"Sujetar el transfer"}
      ], correct:"a", why:"Su función es portar/colgar sueros durante traslados." },

      // Oxígeno
      { id:"u2-037", typeKey:"u2_ud2", q:"Las botellas de oxígeno para traslado se caracterizan por:", options:[
        {k:"a",t:"Ser compactas y con cantidad limitada de O2"},{k:"b",t:"Ser de uso doméstico"},{k:"c",t:"Tener suministro ilimitado"}
      ], correct:"a", why:"Diseñadas para traslados hospitalarios." },

      { id:"u2-038", typeKey:"u2_ud2", q:"Antes de iniciar un traslado con O2, es importante:", options:[
        {k:"a",t:"Comprobar el O2 disponible en la botella"},{k:"b",t:"Abrir ventanas"},{k:"c",t:"Aumentar el caudal al máximo siempre"}
      ], correct:"a", why:"Se verifica cantidad/tiempo estimado de uso." },

      { id:"u2-039", typeKey:"u2_ud2", q:"Para evitar problemas, se recomienda abrir y regular el caudal de O2:", options:[
        {k:"a",t:"Después de conectar la mascarilla al paciente"},{k:"b",t:"Antes de conectar la mascarilla a la botella/paciente"},{k:"c",t:"No hace falta regular"}
      ], correct:"b", why:"Se regula antes para detectar fallos y evitar incidencias." },

      // Secuencia de acciones (traslado convencional)
      { id:"u2-040", typeKey:"u2_ud2", q:"Durante el traslado, las barandillas deben ir:", options:[
        {k:"a",t:"Siempre bajadas"},{k:"b",t:"Siempre levantadas"},{k:"c",t:"Solo en ascensores"}
      ], correct:"b", why:"Seguridad del paciente durante el desplazamiento." },

      { id:"u2-041", typeKey:"u2_ud2", q:"Durante el traslado, la responsabilidad del paciente es:", options:[
        {k:"a",t:"De la unidad de origen"},{k:"b",t:"Del celador que traslada"},{k:"c",t:"Del acompañante"}
      ], correct:"b", why:"Durante el traslado la responsabilidad recae en quien lo realiza." },

      { id:"u2-042", typeKey:"u2_ud2", q:"Antes de la transferencia, la camilla se coloca:", options:[
        {k:"a",t:"En paralelo a la cama"},{k:"b",t:"En diagonal lejos"},{k:"c",t:"En otra habitación"}
      ], correct:"a", why:"Paralelo facilita transferencia segura." },

      { id:"u2-043", typeKey:"u2_ud2", q:"En traslado convencional, debemos vigilar especialmente:", options:[
        {k:"a",t:"Vías, drenajes, oxígeno, etc."},{k:"b",t:"Que el paciente mire al techo"},{k:"c",t:"Que el celador corra"}
      ], correct:"a", why:"Evita arrancamientos y complicaciones." },

      { id:"u2-044", typeKey:"u2_ud2", q:"Para hacer uso del transfer, se suele:", options:[
        {k:"a",t:"Girar al paciente hacia el lado opuesto a la camilla para colocarlo debajo"},{k:"b",t:"Colocarlo encima del paciente y empujar"},{k:"c",t:"Meterlo debajo sin mover al paciente"}
      ], correct:"a", why:"Se coloca por debajo con el paciente girado para facilitar." },

      { id:"u2-045", typeKey:"u2_ud2", q:"Para realizar la transferencia del paciente, siempre contaremos con:", options:[
        {k:"a",t:"Presencia de personal de enfermería de la unidad"},{k:"b",t:"Solo el acompañante"},{k:"c",t:"Nadie más aunque el paciente dependa totalmente"}
      ], correct:"a", why:"Se destaca coordinación y soporte de enfermería." },

      { id:"u2-046", typeKey:"u2_ud2", q:"Al finalizar un traslado, es correcto:", options:[
        {k:"a",t:"Dejar material en el pasillo si hay prisa"},{k:"b",t:"Limpiar/desinfectar material si procede y devolverlo a su sitio"},{k:"c",t:"No hacer higiene de manos"}
      ], correct:"b", why:"Higiene + orden del material son parte del procedimiento." },

      // Traslado traumático
      { id:"u2-047", typeKey:"u2_ud2", q:"En traslado de paciente traumático, se debe prestar especial atención a:", options:[
        {k:"a",t:"Fracturas e inmovilizaciones"},{k:"b",t:"Que el paciente vaya hablando"},{k:"c",t:"Solo a la documentación"}
      ], correct:"a", why:"Se vigilan lesiones e inmovilizaciones." },

      { id:"u2-048", typeKey:"u2_ud2", q:"Una inmovilización común en traumatología mencionada es:", options:[
        {k:"a",t:"Férula de Brown"},{k:"b",t:"Transfer"},{k:"c",t:"Disco giratorio"}
      ], correct:"a", why:"Se cita la férula de Brown para fractura supracondílea de fémur." },

      { id:"u2-049", typeKey:"u2_ud2", q:"En el traslado traumático, al entrar y salir del ascensor es importante:", options:[
        {k:"a",t:"Ir rápido para acabar antes"},{k:"b",t:"Evitar golpes y desniveles que causen dolor"},{k:"c",t:"Bajar barandillas"}
      ], correct:"b", why:"Evitar golpes innecesarios y controlar desniveles." },

      // Aislamiento protector / inmunodeprimidos
      { id:"u2-050", typeKey:"u2_ud2", q:"Un paciente inmunodeprimido con aislamiento protector requiere:", options:[
        {k:"a",t:"Evitar contaminación por gérmenes externos"},{k:"b",t:"Ventilar la habitación con público"},{k:"c",t:"Retirar mascarillas al paciente"}
      ], correct:"a", why:"Son más susceptibles a infecciones." },

      { id:"u2-051", typeKey:"u2_ud2", q:"Mascarilla quirúrgica: su filtrado principal es:", options:[
        {k:"a",t:"De dentro hacia fuera"},{k:"b",t:"De fuera hacia dentro"},{k:"c",t:"No filtra"}
      ], correct:"a", why:"La quirúrgica protege al entorno del portador (filtrado interior→exterior)." },

      { id:"u2-052", typeKey:"u2_ud2", q:"Mascarilla FFP2: su filtrado principal es:", options:[
        {k:"a",t:"De dentro hacia fuera"},{k:"b",t:"De fuera hacia dentro"},{k:"c",t:"Solo lateral"}
      ], correct:"b", why:"FFP2 filtra aire inspirado (exterior→interior)." },

      { id:"u2-053", typeKey:"u2_ud2", q:"En aislamiento protector, antes de salir de la habitación se recomienda colocar al paciente:", options:[
        {k:"a",t:"Mascarilla FFP2"},{k:"b",t:"Mascarilla quirúrgica al celador y nada al paciente"},{k:"c",t:"Sin mascarilla"}
      ], correct:"a", why:"Se indica FFP2 para el paciente antes de salir." },

      { id:"u2-054", typeKey:"u2_ud2", q:"Durante el traslado de un paciente en aislamiento protector:", options:[
        {k:"a",t:"El paciente lleva mascarilla; el profesional no lleva EPI durante el trayecto (según el protocolo descrito)"},{k:"b",t:"Todos deben llevar doble EPI siempre"},{k:"c",t:"Se quita la mascarilla al paciente para que respire mejor"}
      ], correct:"a", why:"Según el procedimiento descrito: paciente protegido con su mascarilla durante el traslado." },

      // Extra (función del celador / actitud)
      { id:"u2-055", typeKey:"u2_ud2", q:"Una actitud profesional clave del celador con el paciente es:", options:[
        {k:"a",t:"Ser amable y respetuoso"},{k:"b",t:"Ignorar al paciente"},{k:"c",t:"Discutir con familiares"}
      ], correct:"a", why:"El trato influye en la experiencia del paciente y acompañantes." },

      { id:"u2-056", typeKey:"u2_ud2", q:"Al movilizar pacientes, para preservar intimidad se recomienda:", options:[
        {k:"a",t:"Cerrar puerta o cortinas del box"},{k:"b",t:"Dejar puerta abierta siempre"},{k:"c",t:"Pedir al paciente que no mire"}
      ], correct:"a", why:"Intimidad y respeto: puerta/cortinas." },

      // Extras para tener más variabilidad
      { id:"u2-057", typeKey:"u2_ud2", q:"Antes de entrar en la habitación para un traslado, suele prepararse:", options:[
        {k:"a",t:"Ropa/sábanas/manta necesarias"},{k:"b",t:"Un informe de laboratorio"},{k:"c",t:"Solo el ascensor"}
      ], correct:"a", why:"Se prepara ropa para confort y seguridad." },

      { id:"u2-058", typeKey:"u2_ud2", q:"Durante el traslado, ante un imprevisto con el paciente:", options:[
        {k:"a",t:"Esperar a llegar al destino"},{k:"b",t:"Entrar en la unidad más próxima y avisar"},{k:"c",t:"Continuar sin avisar"}
      ], correct:"b", why:"Se recomienda no esperar y buscar ayuda en unidad cercana." },

      { id:"u2-059", typeKey:"u2_ud2", q:"Nunca se debe dejar al paciente solo durante el traslado porque:", options:[
        {k:"a",t:"Puede caer o empeorar sin vigilancia"},{k:"b",t:"Es más rápido si va solo"},{k:"c",t:"No importa si está dormido"}
      ], correct:"a", why:"Seguridad: vigilancia continua durante traslado." },

      { id:"u2-060", typeKey:"u2_ud2", q:"En maniobras entre 2 o más sanitarios, antes de iniciar es importante:", options:[
        {k:"a",t:"Acordar cómo se hará y quién coordina"},{k:"b",t:"Cada uno actúa por su cuenta"},{k:"c",t:"Empezar sin hablar para ahorrar tiempo"}
      ], correct:"a", why:"Reduce indecisiones y mejora seguridad." },
    ];

    let currentExam = [];

    function fmt(n){
      const s = (Math.round(n * 100) / 100).toFixed(2);
      return s.replace(/\.00$/, '').replace(/(\.[0-9])0$/, '$1');
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function shuffle(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getActiveTypeKey(){
      return elExamType.value;
    }

    function getTypeCfg(typeKey){
      return EXAM_TYPES[typeKey];
    }

    function getCountForSelection(){
      const cfg = getTypeCfg(getActiveTypeKey());
      if(cfg.sizeMode === "fixed"){
        const pool = QUESTION_BANK.filter(q => q.typeKey === getActiveTypeKey());
        const fixed = cfg.fixedCount ?? pool.length;
        return fixed;
      }
      return Number(elSize.value);
    }

    function setRulesUI(){
      const cfg = getTypeCfg(getActiveTypeKey());

      if(cfg.scoringMode === "count"){
        scoreLabel.textContent = "Aciertos";
        const n = getCountForSelection();
        const txt = `Reglas: ${n} preguntas · Resultado = aciertos / ${n}.`;
        rulesText.textContent = txt;
        rulesKpi.textContent = txt;
        scorePill.textContent = txt;
        return;
      }

      scoreLabel.textContent = "Puntuación total";
      const n = Number(elSize.value);
      const s = SCORING[n];
      const txt = `Reglas: Bien +${fmt(s.ok)} · Mal ${fmt(s.bad)} · Blanco +${fmt(s.blank)}.`;
      rulesText.textContent = txt;
      rulesKpi.textContent = txt;
      scorePill.textContent = txt;
    }

    function rebuildExamTypeOptions(){
      const unit = elUnit.value;
      const options = Object.entries(EXAM_TYPES)
        .filter(([,cfg]) => cfg.unit === unit)
        .map(([k,cfg]) => ({k, label: cfg.label}));

      elExamType.innerHTML = options.map(o => `<option value="${o.k}">${escapeHtml(o.label)}</option>`).join("");

      // Prefer defaults
      if(unit === "u1") elExamType.value = "u1_ud1";
      if(unit === "u2") elExamType.value = "u2_ud2";

      applyTypeUI();
      setRulesUI();
    }

    function applyTypeUI(){
      const cfg = getTypeCfg(getActiveTypeKey());
      if(cfg.sizeMode === "fixed"){
        sizeWrap.classList.add("disabled");
        elSize.disabled = true;
      } else {
        sizeWrap.classList.remove("disabled");
        elSize.disabled = false;
      }
    }

    function pickExam(typeKey, n){
      const pool = QUESTION_BANK.filter(q => q.typeKey === typeKey);
      if(pool.length < n){
        throw new Error(`No hay suficientes preguntas en el banco (${pool.length}) para generar ${n}.`);
      }
      return shuffle([...pool]).slice(0, n);
    }

    function renderOption(idx, opt){
      const name = `q_${idx}`;
      const id = `${name}_${opt.k}`;
      const label = opt.k.toUpperCase();
      return `
        <label class="opt" for="${id}">
          <input type="radio" id="${id}" name="${name}" value="${opt.k}" ${locked ? 'disabled' : ''} />
          <span><b>${label}.</b> ${escapeHtml(opt.t)}</span>
        </label>
      `;
    }

    function renderExam(){
      quizEl.innerHTML = '';
      results.style.display = 'none';
      review.innerHTML = '';

      currentExam.forEach((q, idx) => {
        const qWrap = document.createElement('div');
        qWrap.className = 'q';
        qWrap.dataset.qid = q.id;

        const optsHtml = q.options.map(opt => renderOption(idx, opt)).join("");

        qWrap.innerHTML = `
          <div class="qhead">
            <div class="qnum">${idx + 1}</div>
            <p class="qtext">${escapeHtml(q.q)}</p>
          </div>
          <div class="options">
            ${optsHtml}
          </div>
          <div style="margin-top:10px;">
            <button type="button" class="secondary" data-clear="${idx}" style="padding:10px 12px;">
              Dejar en blanco
            </button>
          </div>
        `;

        quizEl.appendChild(qWrap);
      });
    }

    function getAnswers(){
      const answers = [];
      currentExam.forEach((q, idx) => {
        const name = `q_${idx}`;
        const chosen = document.querySelector(`input[name="${name}"]:checked`);
        answers.push({ id: q.id, chosen: chosen ? chosen.value : null });
      });
      return answers;
    }

    function renderReviewItem(index, q, chosen, status){
      const node = document.createElement('div');
      node.className = 'q';

      const chosenTxt = chosen ? chosen.toUpperCase() : '—';
      const correctTxt = q.correct.toUpperCase();

      const optionsHtml = q.options.map(o => {
        const isCorrect = o.k === q.correct;
        const isChosen = chosen === o.k;

        let badge = '';
        if(isCorrect) badge += `<span class="tag good" style="margin-left:8px;">CORRECTA</span>`;
        if(isChosen && isCorrect) badge += `<span class="tag good" style="margin-left:8px;">TU RESPUESTA</span>`;
        if(isChosen && !isCorrect) badge += `<span class="tag bad" style="margin-left:8px;">TU RESPUESTA</span>`;

        const extraStyle = isCorrect
          ? 'border:1px solid rgba(57,217,138,.45); background: rgba(57,217,138,.08);'
          : (isChosen && !isCorrect)
            ? 'border:1px solid rgba(255,92,122,.45); background: rgba(255,92,122,.07);'
            : '';

        return `
          <div class="opt" style="${extraStyle}">
            <div style="min-width:28px; font-weight:900; color: var(--muted);">${escapeHtml(o.k.toUpperCase())}.</div>
            <div style="flex:1;">
              <div style="font-size:14px;">${escapeHtml(o.t)} ${badge}</div>
            </div>
          </div>
        `;
      }).join('');

      node.innerHTML = `
        <div class="qhead">
          <div class="qnum">${index + 1}</div>
          <div style="flex:1;">
            <p class="qtext" style="margin:0;">${escapeHtml(q.q)}</p>
            <div style="margin-top:8px;">
              <span class="tag ${status.type}">${status.label}</span>
            </div>
            <div class="answerline">Tu respuesta: <b>${chosenTxt}</b> · Correcta: <b>${correctTxt}</b></div>
            <div class="options" style="margin-top:10px;">${optionsHtml}</div>
            <div class="why">${escapeHtml(q.why || "")}</div>
          </div>
        </div>
      `;

      return node;
    }

    function evaluate(){
      if(locked) return;
      locked = true;

      const typeKey = getActiveTypeKey();
      const cfg = getTypeCfg(typeKey);
      const answers = getAnswers();

      let ok = 0, bad = 0, blank = 0;
      let score = 0;

      const byId = new Map(currentExam.map(q => [q.id, q]));
      const reviewNodes = [];

      answers.forEach((a, i) => {
        const q = byId.get(a.id);
        const chosen = a.chosen;
        const correct = q.correct;

        let status;
        if(!chosen){
          blank++;
          status = { type: 'blank', label: 'EN BLANCO' };
        } else if(chosen === correct){
          ok++;
          status = { type: 'good', label: 'CORRECTA' };
        } else {
          bad++;
          status = { type: 'bad', label: 'INCORRECTA' };
        }

        // Scoring
        if(cfg.scoringMode === "points"){
          const n = Number(elSize.value);
          const s = SCORING[n];
          if(!chosen) score += s.blank;
          else if(chosen === correct) score += s.ok;
          else score += s.bad;
        } else {
          // count mode -> score = ok only
          score = ok;
        }

        reviewNodes.push(renderReviewItem(i, q, chosen, status));
      });

      // Lock inputs
      document.querySelectorAll('#quiz input[type="radio"]').forEach(r => r.disabled = true);
      document.querySelectorAll('#quiz button[data-clear]').forEach(b => b.disabled = true);

      // Show results
      const total = currentExam.length;

      if(cfg.scoringMode === "count"){
        totalScoreEl.textContent = `${ok} / ${total}`;
        summaryTextEl.textContent = `${ok} bien · ${bad} mal · ${blank} en blanco`;
      } else {
        totalScoreEl.textContent = fmt(score);
        summaryTextEl.textContent = `${ok} bien · ${bad} mal · ${blank} en blanco`;
      }

      review.innerHTML = '';
      reviewNodes.forEach(n => review.appendChild(n));

      results.style.display = 'block';
      results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function clearQuestion(idx){
      const name = `q_${idx}`;
      document.querySelectorAll(`#quiz input[name="${name}"]`).forEach(r => {
        r.checked = false;
        r.dataset.wasChecked = '0';
      });
    }

    function resetAll(){
      locked = false;
      currentExam = [];
      quizEl.innerHTML = '';
      review.innerHTML = '';
      results.style.display = 'none';
      quizSection.classList.add('hide');
      actions.classList.add('hide');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function start(){
      locked = false;

      const typeKey = getActiveTypeKey();
      const cfg = getTypeCfg(typeKey);
      const n = getCountForSelection();

      currentExam = pickExam(typeKey, n);
      renderExam();

      quizSection.classList.remove('hide');
      actions.classList.remove('hide');

      quizSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ==========================================================
    //  EVENTS
    // ==========================================================
    elUnit.addEventListener('change', () => {
      rebuildExamTypeOptions();
    });

    elExamType.addEventListener('change', () => {
      applyTypeUI();
      setRulesUI();
    });

    elSize.addEventListener('change', setRulesUI);

    startBtn.addEventListener('click', () => {
      try { start(); }
      catch(e){ alert(e.message); }
    });

    evaluateBtn.addEventListener('click', evaluate);
    restartBtn.addEventListener('click', resetAll);

    // Dejar en blanco
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-clear]');
      if(!btn) return;
      if(locked) return;
      clearQuestion(Number(btn.dataset.clear));
    });

    // Tap again to unselect (mobile-friendly)
    document.addEventListener('click', (e) => {
      const r = e.target.closest('#quiz input[type="radio"]');
      if(!r) return;
      if(locked) return;

      if(r.dataset.wasChecked === '1'){
        e.preventDefault();
        r.checked = false;
        r.dataset.wasChecked = '0';
      } else {
        const name = r.name;
        document.querySelectorAll(`#quiz input[name="${name}"]`).forEach(x => x.dataset.wasChecked = '0');
        r.dataset.wasChecked = '1';
      }
    }, true);

    // Result footer actions
    newExamBtn.addEventListener('click', () => {
      resetAll();
      start();
    });

    backTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    restartFromResultsBtn.addEventListener('click', resetAll);

    changeConfigBtn.addEventListener('click', () => {
      resetAll();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Init
    rebuildExamTypeOptions();
    setRulesUI();
  </script>
</body>
</html>
